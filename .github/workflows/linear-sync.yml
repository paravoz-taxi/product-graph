name: Sync Linear

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Create Linear projects and issues"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  sync-linear:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate graph
        run: npm run validate

      - name: Plan Linear sync
        if: inputs.apply != 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          LINEAR_TEAM_KEY: ${{ vars.LINEAR_TEAM_KEY }}
        run: npm run linear:plan

      - name: Apply Linear sync
        if: inputs.apply == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          LINEAR_TEAM_KEY: ${{ vars.LINEAR_TEAM_KEY }}
        run: npm run linear:sync
